<!DOCTYPE html>
<html lang="zh-CN" x-data="app()" :class="darkMode ? 'dark' : ''">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>secAgent</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script>
tailwind.config = {
  darkMode:'class',
  theme:{extend:{colors:{primary:{50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a'}}}}
}
</script>
<style>
[x-cloak]{display:none!important}
/* nav-card: styles applied inline */
.card{@apply bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-6;}
.badge-critical{@apply bg-red-100 text-red-700 border border-red-200;}
.badge-high{@apply bg-orange-100 text-orange-700 border border-orange-200;}
.badge-medium{@apply bg-yellow-100 text-yellow-700 border border-yellow-200;}
.badge-low{@apply bg-blue-100 text-blue-700 border border-blue-200;}
.badge-info{@apply bg-slate-100 text-slate-600 border border-slate-200;}
.badge-confirmed{@apply bg-green-100 text-green-700 border border-green-200;}
.badge-false_positive{@apply bg-slate-100 text-slate-500 border border-slate-200;}
.badge-pending{@apply bg-yellow-100 text-yellow-700 border border-yellow-200;}
.input{@apply w-full border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400 bg-white dark:bg-slate-700 dark:text-white transition;}
.btn{@apply px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 cursor-pointer;}
.btn-primary{@apply bg-primary-600 text-white hover:bg-primary-700 shadow-sm;}
.btn-ghost{@apply text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-700;}
.tag{@apply inline-flex items-center rounded-full text-xs font-medium;}
.scroll-thin::-webkit-scrollbar{width:4px;height:4px;}
.scroll-thin::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px;}
.scroll-thin::-webkit-scrollbar-track{background:transparent;}
pre,code{font-family:'Courier New',monospace;font-size:12px;}
textarea.code{font-family:'Courier New',monospace;font-size:12px;}
</style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen" x-cloak>

<div class="flex h-screen overflow-hidden">

  <!-- ═══ SIDEBAR ══════════════════════════════════════════ -->
  <aside class="w-64 flex-shrink-0 bg-slate-50 dark:bg-slate-900 border-r border-slate-200 dark:border-slate-700 flex flex-col">
    <div class="px-4 py-5 border-b border-slate-200 dark:border-slate-700">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-primary-600 rounded-xl flex items-center justify-center shadow-md">
          <i class="fa-solid fa-shield-halved text-white text-base"></i>
        </div>
        <div>
          <div class="font-bold text-primary-700 dark:text-primary-400 text-base leading-tight">secAgent</div>
          <div class="text-xs text-slate-400">AI Pentest Platform</div>
        </div>
      </div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-2 overflow-y-auto scroll-thin">
      <template x-for="item in navItems" :key="item.id">
        <div class="flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition-all duration-200 text-sm font-medium border shadow-sm"
             :class="page===item.id
               ? 'bg-primary-600 text-white border-primary-600 shadow-md'
               : 'bg-white dark:bg-slate-700 border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 hover:bg-primary-50 hover:text-primary-700 hover:border-primary-200 hover:shadow-md'"
             @click="navigate(item.id)">
          <i :class="item.icon + ' w-5 text-center text-sm'"></i>
          <span x-text="item.label" class="flex-1"></span>
          <span x-show="item.id==='vulns' && vulnCount>0"
                class="bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5 leading-none"
                x-text="vulnCount"></span>
        </div>
      </template>
    </nav>
    <div class="px-3 pb-4 pt-2 border-t border-slate-200 dark:border-slate-700">
      <div class="flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition-all duration-200 text-sm font-medium border shadow-sm"
           :class="page==='settings'
             ? 'bg-primary-600 text-white border-primary-600 shadow-md'
             : 'bg-white dark:bg-slate-700 border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 hover:bg-primary-50 hover:text-primary-700 hover:border-primary-200 hover:shadow-md'"
           @click="navigate('settings')">
        <i class="fa-solid fa-gear w-5 text-center text-sm"></i>
        <span class="flex-1">系统设置</span>
      </div>
    </div>
  </aside>

  <!-- ═══ MAIN + RIGHT PANEL ═══════════════════════════════ -->
  <div class="flex-1 flex overflow-hidden min-w-0">

    <!-- Main -->
    <div class="flex-1 flex flex-col overflow-hidden min-w-0">
      <!-- Topbar -->
      <header class="bg-white dark:bg-slate-800 border-b border-slate-100 dark:border-slate-700 px-6 py-4 flex items-center justify-between flex-shrink-0">
        <div>
          <h1 class="text-lg font-semibold" x-text="currentTitle"></h1>
          <p class="text-xs text-slate-400 mt-0.5" x-text="currentSubtitle"></p>
        </div>
        <div class="flex items-center gap-3">
          <button @click="darkMode=!darkMode;saveDarkMode()" class="btn btn-ghost w-9 h-9 p-0 flex items-center justify-center rounded-xl">
            <i :class="darkMode ? 'fa-solid fa-sun' : 'fa-solid fa-moon'"></i>
          </button>
          <div class="w-8 h-8 bg-primary-100 rounded-full flex items-center justify-center">
            <i class="fa-solid fa-user text-primary-600 text-xs"></i>
          </div>
        </div>
      </header>

      <!-- Page content -->
      <div class="flex-1 overflow-y-auto scroll-thin p-6">

        <!-- PROJECTS -->
        <div x-show="page==='projects'">
          <div class="flex justify-end mb-6">
            <button class="btn btn-primary flex items-center gap-2"
              @click="openPanel('projectForm');editItem=null;projectForm={name:'',target:'',description:'',mode:'single',agent_id:''}">
              <i class="fa-solid fa-plus"></i> 新建项目
            </button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            <template x-for="p in projects" :key="p.id">
              <div class="card hover:shadow-md transition-all cursor-pointer" @click="openProject(p)">
                <div class="flex items-start justify-between mb-3">
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center" :class="p.mode==='single'?'bg-primary-100':'bg-purple-100'">
                      <i :class="p.mode==='single'?'fa-solid fa-robot text-primary-600':'fa-solid fa-sitemap text-purple-600'" class="text-sm"></i>
                    </div>
                    <div>
                      <div class="font-semibold text-sm" x-text="p.name"></div>
                      <div class="text-xs text-slate-400" x-text="p.mode==='single'?'单智能体':'多智能体'"></div>
                    </div>
                  </div>
                  <div class="flex gap-1" @click.stop>
                    <button class="btn btn-ghost w-7 h-7 p-0 flex items-center justify-center text-xs" @click="editProject(p)"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-ghost w-7 h-7 p-0 flex items-center justify-center text-xs text-red-400" @click="deleteProject(p.id)"><i class="fa-solid fa-trash"></i></button>
                  </div>
                </div>
                <div class="text-xs text-slate-500 mb-1 truncate" x-text="p.target||'未设置目标'"></div>
                <div class="text-xs text-slate-400 mb-3 line-clamp-2" x-text="p.description||'暂无描述'"></div>
                <div class="flex items-center justify-between">
                  <span class="tag px-2.5 py-0.5" :class="{'bg-green-100 text-green-700':p.status==='completed','bg-yellow-100 text-yellow-700':p.status==='running','bg-slate-100 text-slate-500':p.status==='idle'}" x-text="{'idle':'空闲','running':'运行中','completed':'已完成'}[p.status]||p.status"></span>
                  <span class="text-xs text-slate-400" x-text="new Date(p.created_at).toLocaleDateString('zh-CN')"></span>
                </div>
              </div>
            </template>
            <div x-show="projects.length===0" class="col-span-3 text-center py-16 text-slate-400">
              <i class="fa-solid fa-folder-open text-4xl mb-3 block"></i>暂无项目
            </div>
          </div>
        </div>

        <!-- PROJECT DETAIL -->
        <div x-show="page==='project-detail'">
          <button class="btn btn-ghost mb-4 flex items-center gap-2 text-sm" @click="navigate('projects')">
            <i class="fa-solid fa-arrow-left"></i> 返回项目列表
          </button>
          <template x-if="currentProject">
            <div class="space-y-4">
              <div class="card">
                <div class="flex items-center justify-between mb-4">
                  <div>
                    <h2 class="text-xl font-bold" x-text="currentProject.name"></h2>
                    <div class="text-sm text-slate-400 mt-1" x-text="currentProject.target||'无目标'"></div>
                  </div>
                  <span class="tag px-3 py-1" :class="{'bg-green-100 text-green-700':currentProject.status==='completed','bg-yellow-100 text-yellow-700':currentProject.status==='running','bg-slate-100 text-slate-500':currentProject.status==='idle'}" x-text="{'idle':'空闲','running':'运行中','completed':'已完成'}[currentProject.status]"></span>
                </div>
                <div class="border-t border-slate-100 dark:border-slate-700 pt-4">
                  <label class="block text-xs font-medium text-slate-500 mb-2">任务指令</label>
                  <textarea class="input code h-20 mb-3" x-model="runTask" placeholder="描述测试任务..."></textarea>
                  <button class="btn btn-primary flex items-center gap-2" @click="runAgent()" :disabled="currentProject.status==='running'">
                    <i class="fa-solid fa-play"></i>
                    <span x-text="currentProject.status==='running'?'运行中...':'启动 Agent'"></span>
                  </button>
                </div>
              </div>
              <div class="card">
                <div class="flex items-center justify-between mb-3">
                  <h3 class="font-semibold text-sm">实时输出</h3>
                  <button class="btn btn-ghost text-xs" @click="agentLogs=[]">清空</button>
                </div>
                <div class="bg-slate-900 rounded-xl p-4 h-56 overflow-y-auto scroll-thin font-mono text-xs text-green-400 space-y-1" id="logBox">
                  <div x-show="agentLogs.length===0" class="text-slate-500">等待启动...</div>
                  <template x-for="(log,i) in agentLogs" :key="i">
                    <div :class="log.type==='tool'?'text-yellow-300':log.type==='error'?'text-red-400':log.type==='result'?'text-cyan-300':'text-green-400'">
                      <span class="text-slate-500 select-none" x-text="'['+log.type.toUpperCase()+'] '"></span>
                      <span x-text="log.content"></span>
                    </div>
                  </template>
                </div>
              </div>
              <div class="card">
                <h3 class="font-semibold text-sm mb-4">项目漏洞 (<span x-text="projectVulns.length"></span>)</h3>
                <div class="space-y-2">
                  <template x-for="v in projectVulns" :key="v.id">
                    <div class="border border-slate-100 dark:border-slate-700 rounded-xl p-3 flex items-center gap-3 hover:bg-slate-50 dark:hover:bg-slate-700 cursor-pointer" @click="openVuln(v)">
                      <span class="tag px-2.5 py-0.5" :class="'badge-'+v.severity" x-text="v.severity.toUpperCase()"></span>
                      <div class="flex-1 min-w-0">
                        <div class="text-sm font-medium truncate" x-text="v.title"></div>
                        <div class="text-xs text-slate-400" x-text="v.vuln_type"></div>
                      </div>
                      <span class="tag px-2.5 py-0.5" :class="'badge-'+v.status" x-text="{'pending':'待审核','confirmed':'已确认','false_positive':'误报'}[v.status]"></span>
                    </div>
                  </template>
                  <div x-show="projectVulns.length===0" class="text-center py-8 text-slate-400 text-sm">暂无漏洞</div>
                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- VULNERABILITIES -->
        <div x-show="page==='vulns'">
          <div class="flex flex-wrap items-center gap-3 mb-6">
            <select class="input w-40" x-model="vulnFilter.severity" @change="loadVulns()">
              <option value="">所有严重性</option>
              <option>critical</option><option>high</option><option>medium</option><option>low</option><option>info</option>
            </select>
            <select class="input w-40" x-model="vulnFilter.status" @change="loadVulns()">
              <option value="">所有状态</option>
              <option value="pending">待审核</option><option value="confirmed">已确认</option><option value="false_positive">误报</option>
            </select>
            <button class="btn btn-primary flex items-center gap-2 ml-auto"
              @click="openPanel('vulnForm');editItem=null;vulnForm={project_id:'',title:'',description:'',severity:'medium',vuln_type:'',target:'',poc:'',request_raw:'',response_raw:'',impact:'',recommendation:''}">
              <i class="fa-solid fa-plus"></i> 新增漏洞
            </button>
          </div>
          <div class="space-y-3">
            <template x-for="v in vulns" :key="v.id">
              <div class="card flex items-center gap-4 cursor-pointer hover:shadow-md !p-4" @click="openVuln(v)">
                <span class="tag px-2.5 py-1 font-semibold" :class="'badge-'+v.severity" x-text="v.severity.toUpperCase()"></span>
                <div class="flex-1 min-w-0">
                  <div class="font-semibold text-sm" x-text="v.title"></div>
                  <div class="text-xs text-slate-400 mt-0.5"><span x-text="v.vuln_type"></span><span class="mx-1">·</span><span x-text="v.target"></span></div>
                </div>
                <span class="tag px-2.5 py-0.5" :class="'badge-'+v.status" x-text="{'pending':'待审核','confirmed':'已确认','false_positive':'误报'}[v.status]||v.status"></span>
                <div class="flex gap-1" @click.stop>
                  <button class="btn btn-ghost w-7 h-7 p-0 flex items-center justify-center text-xs text-red-400" @click="deleteVuln(v.id)"><i class="fa-solid fa-trash"></i></button>
                </div>
              </div>
            </template>
            <div x-show="vulns.length===0" class="text-center py-16 text-slate-400">
              <i class="fa-solid fa-bug text-4xl mb-3 block"></i>暂无漏洞
            </div>
          </div>
        </div>

        <!-- MCP -->
        <div x-show="page==='mcps'">
          <div class="flex justify-end mb-6">
            <button class="btn btn-primary flex items-center gap-2"
              @click="openPanel('mcpForm');editItem=null;mcpForm={name:'',description:'',command:'',args_json:'[]',env_json:'{}',enabled:true}">
              <i class="fa-solid fa-plus"></i> 新增 MCP
            </button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <template x-for="m in mcps" :key="m.id">
              <div class="card">
                <div class="flex items-start justify-between mb-3">
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-indigo-100 flex items-center justify-center"><i class="fa-solid fa-plug text-indigo-600 text-sm"></i></div>
                    <div>
                      <div class="font-semibold text-sm" x-text="m.name"></div>
                      <div class="text-xs text-slate-400 truncate max-w-36" x-text="m.command||'未配置命令'"></div>
                    </div>
                  </div>
                  <div class="flex items-center gap-2">
                    <div class="relative inline-flex items-center cursor-pointer" @click.stop>
                      <input type="checkbox" class="sr-only peer" :checked="m.enabled" @change="toggleMCP(m)">
                      <div class="w-9 h-5 bg-slate-200 peer-checked:bg-primary-500 rounded-full peer transition-all after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:rounded-full after:w-4 after:h-4 after:transition-all peer-checked:after:translate-x-4"></div>
                    </div>
                    <button class="btn btn-ghost w-7 h-7 p-0 flex items-center justify-center text-xs" @click="editMCP(m)"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-ghost w-7 h-7 p-0 flex items-center justify-center text-xs text-red-400" @click="deleteMCP(m.id)"><i class="fa-solid fa-trash"></i></button>
                  </div>
                </div>
                <div class="text-xs text-slate-400 line-clamp-2" x-text="m.description||'暂无描述'"></div>
              </div>
            </template>
            <div x-show="mcps.length===0" class="col-span-2 text-center py-16 text-slate-400">
              <i class="fa-solid fa-plug text-4xl mb-3 block"></i>暂无 MCP
            </div>
          </div>
        </div>

        <!-- TOOLS -->
        <div x-show="page==='tools'">
          <div class="flex justify-end mb-6">
            <button class="btn btn-primary flex items-center gap-2"
              @click="openPanel('toolForm');editItem=null;toolForm={name:'',description:'',code:'',enabled:true}">
              <i class="fa-solid fa-plus"></i> 新增 Tool
            </button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <template x-for="t in tools" :key="t.id">
              <div class="card">
                <div class="flex items-start justify-between mb-3">
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-green-100 flex items-center justify-center"><i class="fa-solid fa-wrench text-green-600 text-sm"></i></div>
                    <div>
                      <div class="font-semibold text-sm" x-text="t.name"></div>
                      <div class="text-xs text-slate-400 truncate max-w-36" x-text="t.description||'暂无描述'"></div>
                    </div>
                  </div>
                  <div class="flex items-center gap-2">
                    <span class="tag px-2 py-0.5" :class="t.enabled?'bg-green-100 text-green-700':'bg-slate-100 text-slate-400'" x-text="t.enabled?'启用':'禁用'"></span>
                    <button class="btn btn-ghost w-7 h-7 p-0 flex items-center justify-center text-xs" @click="editTool(t)"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-ghost w-7 h-7 p-0 flex items-center justify-center text-xs text-red-400" @click="deleteTool(t.id)"><i class="fa-solid fa-trash"></i></button>
                  </div>
                </div>
                <pre class="bg-slate-50 dark:bg-slate-900 rounded-lg p-2 text-xs overflow-x-auto max-h-20 scroll-thin text-slate-600 dark:text-slate-300" x-text="t.code.slice(0,150)+(t.code.length>150?'...':'')"></pre>
              </div>
            </template>
            <div x-show="tools.length===0" class="col-span-2 text-center py-16 text-slate-400">
              <i class="fa-solid fa-wrench text-4xl mb-3 block"></i>暂无 Tool
            </div>
          </div>
        </div>

        <!-- AGENTS -->
        <div x-show="page==='agents'">
          <div class="flex justify-end mb-6">
            <button class="btn btn-primary flex items-center gap-2"
              @click="openPanel('agentForm');editItem=null;agentForm={name:'',description:'',mode:'single',system_prompt:'',tools_json:'[]',mcps_json:'[]'}">
              <i class="fa-solid fa-plus"></i> 新增智能体
            </button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <template x-for="a in agents" :key="a.id">
              <div class="card">
                <div class="flex items-start justify-between mb-3">
                  <div class="flex items-center gap-2">
                    <div class="w-9 h-9 rounded-xl flex items-center justify-center" :class="a.mode==='single'?'bg-primary-100':'bg-purple-100'">
                      <i :class="a.mode==='single'?'fa-solid fa-robot text-primary-600':'fa-solid fa-sitemap text-purple-600'"></i>
                    </div>
                    <div>
                      <div class="font-semibold text-sm" x-text="a.name"></div>
                      <div class="text-xs text-slate-400" x-text="a.mode==='single'?'单智能体':'多智能体'"></div>
                    </div>
                  </div>
                  <div class="flex gap-1">
                    <button class="btn btn-ghost w-7 h-7 p-0 flex items-center justify-center text-xs" @click="editAgent(a)"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-ghost w-7 h-7 p-0 flex items-center justify-center text-xs text-red-400" @click="deleteAgent(a.id)"><i class="fa-solid fa-trash"></i></button>
                  </div>
                </div>
                <p class="text-xs text-slate-400 line-clamp-2 mb-3" x-text="a.description||'暂无描述'"></p>
                <div class="text-xs text-slate-400 bg-slate-50 dark:bg-slate-900 rounded-lg p-2 font-mono line-clamp-3" x-text="(a.system_prompt||'').slice(0,200)+'...'"></div>
              </div>
            </template>
            <div x-show="agents.length===0" class="col-span-2 text-center py-16 text-slate-400">
              <i class="fa-solid fa-robot text-4xl mb-3 block"></i>暂无智能体
            </div>
          </div>
        </div>

        <!-- SKILLS -->
        <div x-show="page==='skills'">
          <div class="flex justify-end mb-6">
            <button class="btn btn-primary flex items-center gap-2"
              @click="openPanel('skillForm');editItem=null;skillForm={name:'',description:'',content:'',tags_json:'[]'};skillTagsRaw=''">
              <i class="fa-solid fa-plus"></i> 新增 Skill
            </button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            <template x-for="s in skills" :key="s.id">
              <div class="card">
                <div class="flex items-start justify-between mb-3">
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-amber-100 flex items-center justify-center"><i class="fa-solid fa-bolt text-amber-600 text-sm"></i></div>
                    <div class="font-semibold text-sm" x-text="s.name"></div>
                  </div>
                  <div class="flex gap-1">
                    <button class="btn btn-ghost w-7 h-7 p-0 flex items-center justify-center text-xs" @click="editSkill(s)"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn btn-ghost w-7 h-7 p-0 flex items-center justify-center text-xs text-red-400" @click="deleteSkill(s.id)"><i class="fa-solid fa-trash"></i></button>
                  </div>
                </div>
                <p class="text-xs text-slate-400 line-clamp-3 mb-3" x-text="s.description||s.content.slice(0,100)"></p>
                <div class="flex flex-wrap gap-1">
                  <template x-for="tag in parseTags(s.tags_json)" :key="tag">
                    <span class="tag bg-primary-50 text-primary-600 px-2 py-0.5" x-text="tag"></span>
                  </template>
                </div>
              </div>
            </template>
            <div x-show="skills.length===0" class="col-span-3 text-center py-16 text-slate-400">
              <i class="fa-solid fa-bolt text-4xl mb-3 block"></i>暂无 Skill
            </div>
          </div>
        </div>

        <!-- SETTINGS -->
        <div x-show="page==='settings'">
          <div class="max-w-2xl space-y-4">
            <div class="card">
              <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-palette text-primary-500"></i> 外观</h3>
              <div class="flex gap-3">
                <button class="flex-1 py-3 rounded-xl border-2 transition-all flex flex-col items-center gap-2 text-sm"
                  :class="!darkMode?'border-primary-500 bg-primary-50 text-primary-700':'border-slate-200 hover:border-slate-300'"
                  @click="darkMode=false;saveDarkMode()">
                  <i class="fa-solid fa-sun text-xl"></i>日间模式
                </button>
                <button class="flex-1 py-3 rounded-xl border-2 transition-all flex flex-col items-center gap-2 text-sm"
                  :class="darkMode?'border-primary-500 bg-primary-900 text-primary-300':'border-slate-200 hover:border-slate-300'"
                  @click="darkMode=true;saveDarkMode()">
                  <i class="fa-solid fa-moon text-xl"></i>夜间模式
                </button>
              </div>
            </div>
            <div class="card">
              <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-microchip text-primary-500"></i> 模型配置</h3>
              <div class="space-y-3">
                <div>
                  <label class="block text-xs font-medium text-slate-500 mb-1">服务商</label>
                  <select class="input" x-model="settingsForm.provider">
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="openai">OpenAI</option>
                    <option value="openai-compatible">OpenAI 兼容接口</option>
                    <option value="azure">Azure OpenAI</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-medium text-slate-500 mb-1">模型名称</label>
                  <input class="input" x-model="settingsForm.model" placeholder="如 claude-opus-4-5-20250929"/>
                </div>
                <div x-show="settingsForm.provider!=='anthropic'">
                  <label class="block text-xs font-medium text-slate-500 mb-1">Base URL</label>
                  <input class="input" x-model="settingsForm.base_url" placeholder="https://your-endpoint/v1"/>
                </div>
                <div>
                  <label class="block text-xs font-medium text-slate-500 mb-1">API Key</label>
                  <div class="flex gap-2">
                    <input class="input flex-1" :type="showKey?'text':'password'" x-model="settingsForm.api_key" placeholder="sk-..."/>
                    <button class="btn btn-ghost px-3" @click="showKey=!showKey"><i :class="showKey?'fa-solid fa-eye-slash':'fa-solid fa-eye'"></i></button>
                  </div>
                </div>
                <button class="btn btn-primary w-full" @click="saveSettings()">
                  <i class="fa-solid fa-floppy-disk mr-2"></i>保存配置
                </button>
              </div>
            </div>
          </div>
        </div>

      </div><!-- /page content -->
    </div><!-- /main -->

    <!-- ═══ RIGHT SIDE PANEL ══════════════════════════════ -->
    <div class="flex-shrink-0 bg-white dark:bg-slate-800 border-l border-slate-200 dark:border-slate-700 shadow-2xl overflow-hidden transition-all duration-300 flex flex-col"
         :class="rightPanel ? 'w-[460px]' : 'w-0'">

      <div class="w-[460px] flex flex-col h-full" x-show="rightPanel" x-cloak>

        <!-- Panel header -->
        <div class="flex-shrink-0 flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-700">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center" :class="panelIconBg">
              <i :class="panelIcon + ' text-sm'"></i>
            </div>
            <h2 class="font-bold text-base" x-text="panelTitle"></h2>
          </div>
          <button @click="closePanel()" class="w-8 h-8 flex items-center justify-center rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 transition">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <!-- Panel body -->
        <div class="flex-1 overflow-y-auto scroll-thin px-6 py-5">

          <!-- Project Form -->
          <template x-if="rightPanel==='projectForm'">
            <div class="space-y-4">
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1.5">项目名称 <span class="text-red-400">*</span></label>
                <input class="input" x-model="projectForm.name" placeholder="我的渗透测试项目"/>
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1.5">目标</label>
                <input class="input" x-model="projectForm.target" placeholder="https://target.example.com"/>
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1.5">描述</label>
                <textarea class="input h-24" x-model="projectForm.description" placeholder="项目描述..."></textarea>
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1.5">运作模式</label>
                <div class="grid grid-cols-2 gap-2">
                  <label class="flex items-center gap-2 p-3 rounded-xl border-2 cursor-pointer transition-all"
                    :class="projectForm.mode==='single'?'border-primary-500 bg-primary-50 dark:bg-primary-900/30':'border-slate-200 dark:border-slate-600'">
                    <input type="radio" value="single" x-model="projectForm.mode" class="accent-primary-600"/>
                    <div><div class="text-sm font-medium">单智能体</div><div class="text-xs text-slate-400">σAgent</div></div>
                  </label>
                  <label class="flex items-center gap-2 p-3 rounded-xl border-2 cursor-pointer transition-all"
                    :class="projectForm.mode==='multi'?'border-purple-500 bg-purple-50 dark:bg-purple-900/30':'border-slate-200 dark:border-slate-600'">
                    <input type="radio" value="multi" x-model="projectForm.mode" class="accent-purple-600"/>
                    <div><div class="text-sm font-medium">多智能体</div><div class="text-xs text-slate-400">Orchestrator</div></div>
                  </label>
                </div>
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1.5">选择智能体角色</label>
                <select class="input" x-model="projectForm.agent_id">
                  <option value="">自动选择</option>
                  <template x-for="a in agents" :key="a.id">
                    <option :value="a.id" x-text="a.name+' ('+a.mode+')'"></option>
                  </template>
                </select>
              </div>
            </div>
          </template>

          <!-- Vuln Detail -->
          <template x-if="rightPanel==='vulnDetail' && selectedVuln">
            <div>
              <div class="mb-4">
                <div class="flex items-center gap-2 mb-1">
                  <span class="tag font-bold px-2.5 py-1" :class="'badge-'+selectedVuln.severity" x-text="selectedVuln.severity.toUpperCase()"></span>
                  <span class="tag px-2.5 py-0.5" :class="'badge-'+selectedVuln.status" x-text="{'pending':'待审核','confirmed':'已确认','false_positive':'误报'}[selectedVuln.status]"></span>
                </div>
                <div class="text-xs text-slate-400 mt-1" x-text="selectedVuln.vuln_type + ' · ' + selectedVuln.target"></div>
              </div>
              <div class="flex gap-1 bg-slate-100 dark:bg-slate-700 rounded-xl p-1 mb-4">
                <template x-for="tab in ['描述','POC','请求','响应','截图','审核']" :key="tab">
                  <button class="flex-1 py-1.5 text-xs rounded-lg transition-all"
                    :class="vulnTab===tab?'bg-white dark:bg-slate-600 shadow font-semibold text-primary-600':'text-slate-500 hover:text-slate-700'"
                    @click="vulnTab=tab" x-text="tab"></button>
                </template>
              </div>
              <div x-show="vulnTab==='描述'" class="space-y-3">
                <p class="text-sm leading-relaxed text-slate-600 dark:text-slate-300" x-text="selectedVuln.description||'暂无描述'"></p>
                <div x-show="selectedVuln.impact"><label class="text-xs font-medium text-slate-500">影响</label><p class="text-sm mt-1" x-text="selectedVuln.impact"></p></div>
                <div x-show="selectedVuln.recommendation"><label class="text-xs font-medium text-slate-500">修复建议</label><p class="text-sm mt-1" x-text="selectedVuln.recommendation"></p></div>
              </div>
              <div x-show="vulnTab==='POC'">
                <pre class="bg-slate-900 text-green-300 rounded-xl p-4 text-xs overflow-x-auto scroll-thin whitespace-pre-wrap" x-text="selectedVuln.poc||'暂无 POC'"></pre>
              </div>
              <div x-show="vulnTab==='请求'">
                <pre class="bg-slate-900 text-cyan-300 rounded-xl p-4 text-xs overflow-x-auto scroll-thin whitespace-pre-wrap max-h-96" x-text="selectedVuln.request_raw||'暂无请求包'"></pre>
              </div>
              <div x-show="vulnTab==='响应'">
                <pre class="bg-slate-900 text-yellow-300 rounded-xl p-4 text-xs overflow-x-auto scroll-thin whitespace-pre-wrap max-h-96" x-text="selectedVuln.response_raw||'暂无响应包'"></pre>
              </div>
              <div x-show="vulnTab==='截图'" class="flex justify-center">
                <template x-if="selectedVuln.screenshot_b64">
                  <img :src="'data:image/png;base64,'+selectedVuln.screenshot_b64" class="max-w-full rounded-xl border border-slate-200"/>
                </template>
                <div x-show="!selectedVuln.screenshot_b64" class="text-center py-12 text-slate-400 text-sm">暂无截图</div>
              </div>
              <div x-show="vulnTab==='审核'" class="space-y-3">
                <div>
                  <label class="block text-xs font-medium text-slate-500 mb-1.5">审核意见</label>
                  <textarea class="input h-24" x-model="reviewNote" placeholder="说明理由..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-2">
                  <button class="btn bg-green-500 text-white hover:bg-green-600 flex items-center justify-center gap-2" @click="reviewVuln('confirmed')">
                    <i class="fa-solid fa-check"></i>确认漏洞
                  </button>
                  <button class="btn bg-slate-400 text-white hover:bg-slate-500 flex items-center justify-center gap-2" @click="reviewVuln('false_positive')">
                    <i class="fa-solid fa-xmark"></i>标记误报
                  </button>
                </div>
              </div>
            </div>
          </template>

          <!-- Vuln Form -->
          <template x-if="rightPanel==='vulnForm'">
            <div class="space-y-4">
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-xs font-medium text-slate-500 mb-1.5">所属项目</label>
                  <select class="input" x-model="vulnForm.project_id">
                    <option value="">选择项目</option>
                    <template x-for="p in projects" :key="p.id"><option :value="p.id" x-text="p.name"></option></template>
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-medium text-slate-500 mb-1.5">严重程度</label>
                  <select class="input" x-model="vulnForm.severity">
                    <option>critical</option><option>high</option><option>medium</option><option>low</option><option>info</option>
                  </select>
                </div>
              </div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">标题</label><input class="input" x-model="vulnForm.title" placeholder="漏洞标题"/></div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">类型</label><input class="input" x-model="vulnForm.vuln_type" placeholder="XSS / SQLi / SSRF ..."/></div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">目标</label><input class="input" x-model="vulnForm.target" placeholder="受影响 URL"/></div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">描述</label><textarea class="input h-24" x-model="vulnForm.description"></textarea></div>
            </div>
          </template>

          <!-- MCP Form -->
          <template x-if="rightPanel==='mcpForm'">
            <div class="space-y-4">
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">名称 <span class="text-red-400">*</span></label><input class="input" x-model="mcpForm.name"/></div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">描述</label><textarea class="input h-20" x-model="mcpForm.description"></textarea></div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">启动命令</label><input class="input font-mono text-xs" x-model="mcpForm.command" placeholder="python -m my_mcp_server"/></div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">参数 (JSON 数组)</label><input class="input font-mono text-xs" x-model="mcpForm.args_json" placeholder='["--port","8080"]'/></div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">环境变量 (JSON 对象)</label><textarea class="input code h-24" x-model="mcpForm.env_json" placeholder='{"API_KEY":"xxx"}'></textarea></div>
              <div class="flex items-center gap-3"><label class="text-sm">默认启用</label><input type="checkbox" x-model="mcpForm.enabled" class="w-4 h-4 accent-primary-600"/></div>
            </div>
          </template>

          <!-- Tool Form -->
          <template x-if="rightPanel==='toolForm'">
            <div class="space-y-4">
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">工具名称 <span class="text-red-400">*</span></label><input class="input" x-model="toolForm.name" placeholder="my_tool"/></div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">描述</label><textarea class="input h-16" x-model="toolForm.description"></textarea></div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1.5">Python 代码</label>
                <textarea class="input code h-72" x-model="toolForm.code" placeholder="@anthropic.beta_tool&#10;def my_tool(param: str) -> str:&#10;    '''工具描述'''&#10;    return ..."></textarea>
              </div>
              <div class="flex items-center gap-3"><label class="text-sm">启用</label><input type="checkbox" x-model="toolForm.enabled" class="w-4 h-4 accent-primary-600"/></div>
            </div>
          </template>

          <!-- Agent Form -->
          <template x-if="rightPanel==='agentForm'">
            <div class="space-y-4">
              <div class="grid grid-cols-2 gap-3">
                <div><label class="block text-xs font-medium text-slate-500 mb-1.5">名称 <span class="text-red-400">*</span></label><input class="input" x-model="agentForm.name"/></div>
                <div><label class="block text-xs font-medium text-slate-500 mb-1.5">模式</label>
                  <select class="input" x-model="agentForm.mode"><option value="single">单智能体</option><option value="multi">多智能体</option></select>
                </div>
              </div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">描述</label><textarea class="input h-16" x-model="agentForm.description"></textarea></div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1.5">系统提示词</label>
                <textarea class="input code h-72" x-model="agentForm.system_prompt" placeholder="你是一个..."></textarea>
              </div>
            </div>
          </template>

          <!-- Skill Form -->
          <template x-if="rightPanel==='skillForm'">
            <div class="space-y-4">
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">名称 <span class="text-red-400">*</span></label><input class="input" x-model="skillForm.name"/></div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">标签（逗号分隔）</label><input class="input" x-model="skillTagsRaw" placeholder="web, xss, recon"/></div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">描述</label><textarea class="input h-16" x-model="skillForm.description"></textarea></div>
              <div>
                <label class="block text-xs font-medium text-slate-500 mb-1.5">内容 (Markdown)</label>
                <textarea class="input h-72" x-model="skillForm.content" placeholder="## Skill 内容&#10;..."></textarea>
              </div>
            </div>
          </template>

        </div><!-- /panel body -->

        <!-- Panel footer -->
        <div class="flex-shrink-0 border-t border-slate-100 dark:border-slate-700 px-6 py-4 bg-white dark:bg-slate-800"
             x-show="rightPanel && rightPanel !== 'vulnDetail'">
          <div class="flex gap-3">
            <button class="btn btn-ghost flex-1 border border-slate-200 dark:border-slate-600" @click="closePanel()">取消</button>
            <button class="btn btn-primary flex-1" @click="panelSave()">
              <i class="fa-solid fa-floppy-disk mr-2"></i>保存
            </button>
          </div>
        </div>
        <div class="flex-shrink-0 border-t border-slate-100 dark:border-slate-700 px-6 py-4 bg-white dark:bg-slate-800"
             x-show="rightPanel==='vulnDetail'">
          <button class="btn btn-ghost w-full border border-slate-200 dark:border-slate-600" @click="closePanel()">关闭</button>
        </div>

      </div><!-- /panel inner -->
    </div><!-- /right panel -->

  </div><!-- /main+panel -->
</div><!-- /layout -->

<!-- Toast -->
<div class="fixed bottom-6 right-6 z-[100] space-y-2">
  <template x-for="t in toasts" :key="t.id">
    <div class="flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg text-sm font-medium text-white"
      :class="t.type==='success'?'bg-green-500':t.type==='error'?'bg-red-500':'bg-primary-600'"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="translate-x-8 opacity-0"
      x-transition:enter-end="translate-x-0 opacity-100"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-end="opacity-0">
      <i :class="t.type==='success'?'fa-solid fa-check':t.type==='error'?'fa-solid fa-triangle-exclamation':'fa-solid fa-info'"></i>
      <span x-text="t.msg"></span>
    </div>
  </template>
</div>

<script>
function app() {
  return {
    page: 'projects',
    darkMode: localStorage.getItem('darkMode') === 'true',
    rightPanel: null,
    editItem: null,
    toasts: [],

    navItems: [
      {id:'projects', label:'项目',     icon:'fa-solid fa-folder'},
      {id:'vulns',    label:'漏洞',     icon:'fa-solid fa-bug'},
      {id:'mcps',     label:'MCP 管理', icon:'fa-solid fa-plug'},
      {id:'tools',    label:'Tool 管理',icon:'fa-solid fa-wrench'},
      {id:'agents',   label:'智能体',   icon:'fa-solid fa-robot'},
      {id:'skills',   label:'Skill',    icon:'fa-solid fa-bolt'},
    ],

    projects:[], vulns:[], mcps:[], tools:[], agents:[], skills:[], vulnCount:0,
    currentProject:null, projectVulns:[], selectedVuln:null, vulnTab:'描述', reviewNote:'',
    agentLogs:[], runTask:'', wsConn:null,
    vulnFilter:{severity:'',status:''},

    projectForm:{name:'',target:'',description:'',mode:'single',agent_id:''},
    vulnForm:{project_id:'',title:'',description:'',severity:'medium',vuln_type:'',target:'',poc:'',request_raw:'',response_raw:'',impact:'',recommendation:''},
    mcpForm:{name:'',description:'',command:'',args_json:'[]',env_json:'{}',enabled:true},
    toolForm:{name:'',description:'',code:'',enabled:true},
    agentForm:{name:'',description:'',mode:'single',system_prompt:'',tools_json:'[]',mcps_json:'[]'},
    skillForm:{name:'',description:'',content:'',tags_json:'[]'},
    skillTagsRaw:'',
    settingsForm:{provider:'anthropic',model:'',api_key:'',base_url:''},
    showKey:false,

    get panelTitle() {
      return {
        projectForm: this.editItem ? '编辑项目' : '新建项目',
        vulnDetail:  this.selectedVuln?.title || '漏洞详情',
        vulnForm:    '新增漏洞',
        mcpForm:     this.editItem ? '编辑 MCP' : '新增 MCP 服务器',
        toolForm:    this.editItem ? '编辑 Tool' : '新增 Tool',
        agentForm:   this.editItem ? '编辑智能体' : '新增智能体',
        skillForm:   this.editItem ? '编辑 Skill' : '新增 Skill',
      }[this.rightPanel] || ''
    },
    get panelIcon() {
      return {
        projectForm:'fa-solid fa-folder text-primary-600',
        vulnDetail: 'fa-solid fa-bug text-red-500',
        vulnForm:   'fa-solid fa-bug text-red-500',
        mcpForm:    'fa-solid fa-plug text-indigo-600',
        toolForm:   'fa-solid fa-wrench text-green-600',
        agentForm:  'fa-solid fa-robot text-primary-600',
        skillForm:  'fa-solid fa-bolt text-amber-500',
      }[this.rightPanel] || 'fa-solid fa-pencil text-slate-400'
    },
    get panelIconBg() {
      return {
        projectForm:'bg-primary-100',
        vulnDetail: 'bg-red-100',
        vulnForm:   'bg-red-100',
        mcpForm:    'bg-indigo-100',
        toolForm:   'bg-green-100',
        agentForm:  'bg-primary-100',
        skillForm:  'bg-amber-100',
      }[this.rightPanel] || 'bg-slate-100'
    },
    get currentTitle() {
      return {projects:'项目',vulns:'漏洞',mcps:'MCP 管理',tools:'Tool 管理',agents:'智能体管理',skills:'Skill 管理',settings:'系统设置','project-detail':this.currentProject?.name||'项目详情'}[this.page]||''
    },
    get currentSubtitle() {
      return {projects:'管理渗透测试项目',vulns:'漏洞审核与管理',mcps:'MCP 服务器配置',tools:'工具函数管理',agents:'智能体配置与提示词',skills:'技能库管理',settings:'平台配置','project-detail':'项目详情与任务运行'}[this.page]||''
    },

    async init() {
      if (this.darkMode) document.documentElement.classList.add('dark')
      await Promise.all([this.loadProjects(),this.loadVulns(),this.loadMCPs(),this.loadTools(),this.loadAgents(),this.loadSkills(),this.loadSettings()])
    },

    navigate(p) { this.page=p; this.closePanel(); if(p==='vulns') this.loadVulns() },
    saveDarkMode() { localStorage.setItem('darkMode',this.darkMode); document.documentElement.classList.toggle('dark',this.darkMode) },
    openPanel(type) { this.rightPanel=type },
    closePanel() { this.rightPanel=null; this.editItem=null },

    async panelSave() {
      const map={projectForm:()=>this.saveProject(),vulnForm:()=>this.saveVuln(),mcpForm:()=>this.saveMCP(),toolForm:()=>this.saveTool(),agentForm:()=>this.saveAgent(),skillForm:()=>this.saveSkill()}
      if(map[this.rightPanel]) await map[this.rightPanel]()
    },

    toast(msg,type='success'){const id=Date.now();this.toasts.push({id,msg,type});setTimeout(()=>this.toasts=this.toasts.filter(t=>t.id!==id),3000)},
    parseTags(j){try{return JSON.parse(j)||[]}catch{return[]}},

    async api(method,url,body){
      const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined})
      if(!r.ok){const e=await r.json().catch(()=>({detail:r.statusText}));throw new Error(e.detail||r.statusText)}
      return r.json()
    },

    async loadProjects(){this.projects=await this.api('GET','/api/projects/')},
    async openProject(p){this.currentProject=p;this.page='project-detail';this.agentLogs=[];this.closePanel();this.projectVulns=await this.api('GET',`/api/vulns/?project_id=${p.id}`)},
    async saveProject(){try{if(this.editItem)await this.api('PATCH',`/api/projects/${this.editItem.id}`,this.projectForm);else await this.api('POST','/api/projects/',{...this.projectForm,agent_id:this.projectForm.agent_id||null});await this.loadProjects();this.closePanel();this.toast('保存成功')}catch(e){this.toast(e.message,'error')}},
    editProject(p){this.editItem=p;this.projectForm={name:p.name,target:p.target,description:p.description,mode:p.mode,agent_id:p.agent_id||''};this.openPanel('projectForm')},
    async deleteProject(id){if(!confirm('确认删除？'))return;await this.api('DELETE',`/api/projects/${id}`);await this.loadProjects();this.toast('已删除')},

    runAgent(){
      if(!this.currentProject)return
      this.agentLogs=[{type:'info',content:'正在连接...'}]
      const ws=new WebSocket(`ws://localhost:8888/ws/run/${this.currentProject.id}`)
      this.wsConn=ws
      ws.onopen=()=>ws.send(JSON.stringify({task:this.runTask,extra:''}))
      ws.onmessage=(e)=>{const d=JSON.parse(e.data);this.agentLogs.push(d);if(d.type==='done'){this.currentProject.status='completed';this.loadProjectVulns()}if(d.type==='error')this.currentProject.status='idle';this.$nextTick(()=>{const b=document.getElementById('logBox');if(b)b.scrollTop=b.scrollHeight})}
      ws.onclose=()=>{if(this.currentProject)this.currentProject.status='idle'}
      this.currentProject.status='running'
    },
    async loadProjectVulns(){this.projectVulns=await this.api('GET',`/api/vulns/?project_id=${this.currentProject.id}`)},

    async loadVulns(){this.vulns=await this.api('GET','/api/vulns/');this.vulnCount=this.vulns.filter(v=>v.status==='pending').length},
    openVuln(v){this.selectedVuln=v;this.vulnTab='描述';this.reviewNote=v.review_note||'';this.openPanel('vulnDetail')},
    async saveVuln(){try{await this.api('POST','/api/vulns/',{...this.vulnForm,project_id:parseInt(this.vulnForm.project_id)||null});await this.loadVulns();this.closePanel();this.toast('已添加漏洞')}catch(e){this.toast(e.message,'error')}},
    async reviewVuln(status){try{await this.api('POST',`/api/vulns/${this.selectedVuln.id}/review?status=${status}&note=${encodeURIComponent(this.reviewNote)}`);this.selectedVuln.status=status;this.selectedVuln.review_note=this.reviewNote;await this.loadVulns();this.toast(status==='confirmed'?'漏洞已确认':'已标记为误报')}catch(e){this.toast(e.message,'error')}},
    async deleteVuln(id){if(!confirm('确认删除？'))return;await this.api('DELETE',`/api/vulns/${id}`);await this.loadVulns();this.toast('已删除')},

    async loadMCPs(){this.mcps=await this.api('GET','/api/mcps/')},
    async saveMCP(){try{if(this.editItem)await this.api('PATCH',`/api/mcps/${this.editItem.id}`,this.mcpForm);else await this.api('POST','/api/mcps/',this.mcpForm);await this.loadMCPs();this.closePanel();this.toast('保存成功')}catch(e){this.toast(e.message,'error')}},
    editMCP(m){this.editItem=m;this.mcpForm={name:m.name,description:m.description,command:m.command,args_json:m.args_json,env_json:m.env_json,enabled:m.enabled};this.openPanel('mcpForm')},
    async toggleMCP(m){await this.api('PATCH',`/api/mcps/${m.id}`,{enabled:!m.enabled});m.enabled=!m.enabled},
    async deleteMCP(id){if(!confirm('确认删除？'))return;await this.api('DELETE',`/api/mcps/${id}`);await this.loadMCPs();this.toast('已删除')},

    async loadTools(){this.tools=await this.api('GET','/api/tools/')},
    async saveTool(){try{if(this.editItem)await this.api('PATCH',`/api/tools/${this.editItem.id}`,this.toolForm);else await this.api('POST','/api/tools/',this.toolForm);await this.loadTools();this.closePanel();this.toast('保存成功')}catch(e){this.toast(e.message,'error')}},
    editTool(t){this.editItem=t;this.toolForm={name:t.name,description:t.description,code:t.code,enabled:t.enabled};this.openPanel('toolForm')},
    async deleteTool(id){if(!confirm('确认删除？'))return;await this.api('DELETE',`/api/tools/${id}`);await this.loadTools();this.toast('已删除')},

    async loadAgents(){this.agents=await this.api('GET','/api/agents/')},
    async saveAgent(){try{if(this.editItem)await this.api('PATCH',`/api/agents/${this.editItem.id}`,this.agentForm);else await this.api('POST','/api/agents/',this.agentForm);await this.loadAgents();this.closePanel();this.toast('保存成功')}catch(e){this.toast(e.message,'error')}},
    editAgent(a){this.editItem=a;this.agentForm={name:a.name,description:a.description,mode:a.mode,system_prompt:a.system_prompt,tools_json:a.tools_json,mcps_json:a.mcps_json};this.openPanel('agentForm')},
    async deleteAgent(id){if(!confirm('确认删除？'))return;await this.api('DELETE',`/api/agents/${id}`);await this.loadAgents();this.toast('已删除')},

    async loadSkills(){this.skills=await this.api('GET','/api/skills/')},
    async saveSkill(){try{const tags=this.skillTagsRaw.split(',').map(t=>t.trim()).filter(Boolean);this.skillForm.tags_json=JSON.stringify(tags);if(this.editItem)await this.api('PATCH',`/api/skills/${this.editItem.id}`,this.skillForm);else await this.api('POST','/api/skills/',this.skillForm);await this.loadSkills();this.closePanel();this.toast('保存成功')}catch(e){this.toast(e.message,'error')}},
    editSkill(s){this.editItem=s;this.skillForm={name:s.name,description:s.description,content:s.content,tags_json:s.tags_json};this.skillTagsRaw=this.parseTags(s.tags_json).join(', ');this.openPanel('skillForm')},
    async deleteSkill(id){if(!confirm('确认删除？'))return;await this.api('DELETE',`/api/skills/${id}`);await this.loadSkills();this.toast('已删除')},

    async loadSettings(){const s=await this.api('GET','/api/settings/');this.settingsForm={provider:s.provider||'anthropic',model:s.model||'',api_key:'',base_url:s.base_url||''};if(s.theme==='dark'){this.darkMode=true;document.documentElement.classList.add('dark')}},
    async saveSettings(){try{await this.api('PATCH','/api/settings/',{provider:this.settingsForm.provider,model:this.settingsForm.model,base_url:this.settingsForm.base_url,theme:this.darkMode?'dark':'light'});if(this.settingsForm.api_key){await fetch(`/api/settings/api-key?api_key=${encodeURIComponent(this.settingsForm.api_key)}`,{method:'POST'});this.settingsForm.api_key=''}this.toast('设置已保存')}catch(e){this.toast(e.message,'error')}},
  }
}
</script>
</body>
</html>
